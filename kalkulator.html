<!doctype html>
<html lang='id'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1'>
    <title>Kalkulator Profit Marketplace</title>
    <style>
        body{font-family:Arial;background:#f4f4f4;padding:16px;max-width:700px;margin:auto}
        .card{background:#fff;border-radius:10px;padding:14px;margin:12px 0;box-shadow:0 1px 4px #0002}
        input, select{width:100%;padding:8px;margin:4px 0 10px;box-sizing:border-box}
        .row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #eee}
        h2,h3{margin:4px 0 10px}
        .status{font-weight:bold;font-size:18px;margin-top:10px}
    </style>
</head>
<body>

<h2>Kalkulator Profit Marketplace</h2>
<div class=card>
    <label>HPP<input id=hpp type=number value=22000></label>
    <label>Target Untung
        <div style="display:flex; gap:10px;">
            <input id=untung type=number value=3000 style="flex:2">
            <select id=untungTipe style="flex:1">
                <option value="rp">Rp</option>
                <option value="persen">%</option>
            </select>
        </div>
    </label>
    <label>Potongan Marketplace %<input id=mp type=number value=25></label>
    <label>Promo %<input id=promo type=number value=35></label>
    <label>ROAS<input id=roas type=number value=10></label>
</div>

<div class=card><h3>HARGA</h3><div id=harga></div></div>
<div class=card><h3>MARKETPLACE</h3><div id=market></div></div>
<div class=card><h3>PROFIT</h3><div id=profit></div></div>
<div class=card><h3>IKLAN</h3><div id=iklan></div></div>
<script>
const rp = n => "Rp" + Math.round(n).toLocaleString("id-ID");

function row(a,b){
    return `<div class="row"><div>${a}</div><div>${b}</div></div>`;
}

const hpp = document.getElementById("hpp");
const untung = document.getElementById("untung");
const untungTipe = document.getElementById("untungTipe");
const mp = document.getElementById("mp");
const promo = document.getElementById("promo");
const roas = document.getElementById("roas");

const harga = document.getElementById("harga");
const market = document.getElementById("market");
const profit = document.getElementById("profit");
const iklan = document.getElementById("iklan");

function hitung(){

    const H = Number(hpp.value);
    const U_raw = Number(untung.value);
    const M = Number(mp.value)/100;
    const P = Number(promo.value)/100;
    const R = Number(roas.value);

    // Hitung Target Untung (Rp)
    const U = untungTipe.value === "persen" ? (H * (U_raw / 100)) : U_raw;

    // Harga
    const hargaJual = (H + U) / (1 - M);
    const hargaCoret = P > 0 ? hargaJual / (1 - P) : hargaJual;
    const promoRp = hargaCoret - hargaJual;

    // Marketplace
    const potRp = hargaJual * M;
    const diterima = hargaJual - potRp;

    // Profit
    const untungAktual = diterima - H;

    const margin = hargaJual > 0
        ? (untungAktual / hargaJual) * 100
        : 0;

    const markup = H > 0
        ? (untungAktual / H) * 100
        : 0;

    // ROAS
    const roasImpas = untungAktual > 0
        ? hargaJual / untungAktual
        : 0;

    const biaya = R > 0
        ? hargaJual / R
        : 0;

    const sisa = untungAktual - biaya;

    let status = "🟡 IMPAS";
    if(sisa > 0) status = "🟢 UNTUNG";
    if(sisa < 0) status = "🔴 RUGI";

    harga.innerHTML =
        row("Harga Sebelum Coret", rp(hargaCoret)) +
        row(`Promo ${(P*100).toFixed(0)}%`, "-" + rp(promoRp)) +
        row("Harga Jual", rp(hargaJual));

    market.innerHTML =
        row(`Potongan MP ${(M*100).toFixed(0)}%`, "-" + rp(potRp)) +
        row("Uang Diterima Seller", rp(diterima));

    profit.innerHTML =
        row("HPP", rp(H)) +
        row("Target Untung", rp(U) + (untungTipe.value === "persen" ? ` (${U_raw}%)` : "")) +
        row("Untung Aktual", rp(untungAktual)) +
        row("Margin", margin.toFixed(2) + "%") +
        row("Markup", markup.toFixed(2) + "%");

    iklan.innerHTML =
        row("ROAS Impas", roasImpas.toFixed(2)) +
        row("ROAS Input", R) +
        row("Biaya Iklan", rp(biaya)) +
        row("Untung Setelah Iklan", rp(sisa)) +
        `<p class="status">${status}</p>`;
}

document.querySelectorAll("input, select").forEach(i=>{
    i.addEventListener("input", hitung);
});

hitung();
</script>
</body>
</html>
