<!doctype html>
<html lang='id'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1'>
    <title>Kalkulator Profit Marketplace</title>
    <style>
        body{font-family:Arial;background:#f4f4f4;padding:16px;max-width:700px;margin:auto}
        .card{background:#fff;border-radius:10px;padding:14px;margin:12px 0;box-shadow:0 1px 4px #0002}
        input{width:100%;padding:8px;margin:4px 0 10px;box-sizing:border-box}
        .row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #eee}
        h2,h3{margin:4px 0 10px}
        .status{font-weight:bold;font-size:18px;margin-top:10px}
    </style>
</head>
<body>

<h2>Kalkulator Profit Marketplace</h2>
<div class=card>
    <label>HPP<input id=hpp type=number value=22000></label>
    <label>Target Untung<input id=untung type=number value=3000></label>
    <label>Potongan Marketplace %<input id=mp type=number value=25></label>
    <label>Promo %<input id=promo type=number value=35></label>
    <label>ROAS<input id=roas type=number value=10></label>
</div>

<div class=card><h3>HARGA</h3><div id=harga></div></div>
<div class=card><h3>MARKETPLACE</h3><div id=market></div></div>
<div class=card><h3>PROFIT</h3><div id=profit></div></div>
<div class=card><h3>IKLAN</h3><div id=iklan></div></div>

<script>
// Helper untuk format Rupiah
const rp = (n) => "Rp" + Math.round(n).toLocaleString('id-ID');
const row = (label, value) => `<div class=row><span>${label}</span><span>${value}</span></div>`;

function hitung(){
    let H = Number(document.getElementById('hpp').value);
    let U = Number(document.getElementById('untung').value);
    let M = Number(document.getElementById('mp').value) / 100;
    let P = Number(document.getElementById('promo').value) / 100;
    let R = Number(document.getElementById('roas').value);

    let hargaJual = (H + U) / (1 - M);
    let hargaCoret = P > 0 ? hargaJual / (1 - P) : hargaJual;
    let promoRp = hargaCoret - hargaJual;
    let potRp = hargaJual * M;
    let diterima = hargaJual - potRp;
    let untungAktual = diterima - H;
    let margin = hargaJual > 0 ? (untungAktual / hargaJual) * 100 : 0;
    let markup = H > 0 ? (untungAktual / H) * 100 : 0;
    let roasImpas = untungAktual > 0 ? hargaJual / untungAktual : 0;
    let biaya = R > 0 ? hargaJual / R : 0;
    let sisa = untungAktual - biaya;

    let stat = sisa > 0 ? "🟢 UNTUNG" : sisa < 0 ? "🔴 RUGI" : "🟡 IMPAS";

    document.getElementById('harga').innerHTML = row("Harga Sebelum Coret", rp(hargaCoret)) + row("Promo", "-" + rp(promoRp)) + row("Harga Jual", rp(hargaJual));
    document.getElementById('market').innerHTML = row("Potongan MP", "-" + rp(potRp)) + row("Uang Diterima", rp(diterima));
    document.getElementById('profit').innerHTML = row("HPP", rp(H)) + row("Target", rp(U)) + row("Untung Aktual", rp(untungAktual)) + row("Margin", margin.toFixed(2) + "%") + row("Markup", markup.toFixed(2) + "%");
    document.getElementById('iklan').innerHTML = row("ROAS Impas", roasImpas.toFixed(2)) + row("ROAS Input", R) + row("Biaya Iklan", rp(biaya)) + row("Untung Bersih", rp(sisa)) + `<p class="status">${stat}</p>`;
}

// Menjalankan fungsi saat input berubah
document.querySelectorAll('input').forEach(el => {
    el.addEventListener('input', hitung);
});

// Jalankan sekali saat pertama kali buka
hitung();
</script>
</body>
</html>
